<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>MiniKick Chat Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link id="theme-style" rel="stylesheet" href="">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <style>
        :root {
            --font-size: 14px;
        }

        body {
            margin: 0;
            padding: 16px 24px;
            overflow: hidden;
            background-color: transparent;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
            width: 100%;
            overflow: visible;
            justify-content: flex-end;
        }

        .chat-emote {
            height: 28px;
            vertical-align: middle;
            margin: -2px 2px;
            display: inline-block;
        }

        .message-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 12px 16px;
            box-sizing: border-box;
            width: 100%;
            position: relative;
            transform-origin: bottom left;
            animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .message-box.fade-out {
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .badge {
            font-family: 'Outfit', sans-serif;
            font-size: calc(var(--font-size) * 0.72);
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.2em 0.5em;
            border-radius: 4px;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 0.25em;
        }

        .badge-broadcaster {
            background-color: rgba(239, 68, 68, 0.2);
            color: #EF4444;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .badge-moderator {
            background-color: rgba(46, 205, 112, 0.2);
            color: #2ECD70;
            border: 1px solid rgba(46, 205, 112, 0.4);
        }

        .badge-vip {
            background-color: rgba(192, 132, 252, 0.2);
            color: #C084FC;
            border: 1px solid rgba(192, 132, 252, 0.4);
        }

        .badge-subscriber {
            background-color: rgba(59, 130, 246, 0.2);
            color: #3B82F6;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .badge-bot {
            background-color: rgba(156, 163, 175, 0.2);
            color: #9CA3AF;
            border: 1px solid rgba(156, 163, 175, 0.4);
        }

        .username {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: calc(var(--font-size) + 1px);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .message-content {
            font-size: var(--font-size);
            line-height: 1.5;
            word-wrap: break-word;
            word-break: break-word;
        }

        .timestamp {
            font-size: calc(var(--font-size) - 3px);
            color: #71717A;
            margin-right: 4px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div id="chat-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || '';
        const theme = urlParams.get('theme') || 'glass';
        const fadeTime = urlParams.get('fade') !== null ? parseInt(urlParams.get('fade')) : 15;
        const fontSize = urlParams.get('size') || '14px';
        const maxMessages = parseInt(urlParams.get('max')) || 15;
        const showBots = urlParams.get('show_bots') !== 'false';
        const showTime = urlParams.get('show_time') === 'true';

        const themeStyle = document.getElementById('theme-style');
        themeStyle.href = `/chat/css/${theme}.css`;

        document.documentElement.style.setProperty('--font-size', fontSize);

        const container = document.getElementById('chat-container');
        const eventSource = new EventSource(`/chat_events?token=${token}`);

        eventSource.onmessage = function (event) {
            const data = JSON.parse(event.data);
            addMessage(data);
        };

        eventSource.onerror = function (err) {
            console.error("Error en conexión SSE de Chat:", err);
        };

        function addMessage(data) {
            if (!showBots && data.badges && data.badges.includes('bot')) {
                return;
            }

            const msgBox = document.createElement('div');
            msgBox.className = `message-box theme-${theme}`;
            msgBox.style.fontSize = fontSize;

            if (theme === 'neon') {
                const glowColor = data.color || '#2ECD70';
                msgBox.style.borderColor = glowColor;
                msgBox.style.boxShadow = `0 0 10px ${glowColor}, inset 0 0 5px ${glowColor}`;
            }

            if (theme === 'minimal') {
                const lineColor = data.color || '#C084FC';
                msgBox.style.setProperty('--line-color', lineColor);
            }

            if (theme === 'cyber') {
                const cyberColor = data.color || '#00ff66';
                msgBox.style.setProperty('--cyber-color', cyberColor);
            }

            const header = document.createElement('div');
            header.className = 'message-header';

            if (theme === 'cyber') {
                const badgeBox = document.createElement('div');
                badgeBox.className = 'cyber-badge-box';
                badgeBox.innerText = data.user;
                header.appendChild(badgeBox);

                const connector = document.createElement('div');
                connector.className = 'cyber-connector';
                header.appendChild(connector);

                const iconBox = document.createElement('div');
                iconBox.className = 'cyber-icon-box';
                
                let iconHtml = '<i class="ti ti-message-dots"></i>';
                if (data.badges && Array.isArray(data.badges)) {
                    if (data.badges.includes('broadcaster')) {
                        iconHtml = '<i class="ti ti-video"></i>';
                    } else if (data.badges.includes('moderator')) {
                        iconHtml = '<i class="ti ti-shield"></i>';
                    } else if (data.badges.includes('vip')) {
                        iconHtml = '<i class="ti ti-diamond"></i>';
                    } else if (data.badges.includes('subscriber')) {
                        iconHtml = '<i class="ti ti-star"></i>';
                    } else if (data.badges.includes('bot')) {
                        iconHtml = '<i class="ti ti-robot"></i>';
                    }
                }
                iconBox.innerHTML = iconHtml;
                header.appendChild(iconBox);
            } else {
                if (showTime) {
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'timestamp';
                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    timeSpan.innerText = `[${hours}:${minutes}]`;
                    header.appendChild(timeSpan);
                }

                if (data.badges && Array.isArray(data.badges)) {
                    data.badges.forEach(badge => {
                        const badgeSpan = document.createElement('span');
                        badgeSpan.className = `badge badge-${badge}`;
                        badgeSpan.innerText = getBadgeLabel(badge);
                        header.appendChild(badgeSpan);
                    });
                }

                const nameSpan = document.createElement('span');
                nameSpan.className = 'username';
                nameSpan.style.color = data.color || '#FAFAFA';
                nameSpan.innerText = data.user;
                header.appendChild(nameSpan);
            }

            msgBox.appendChild(header);

            const content = document.createElement('div');
            content.className = 'message-content';
            
            if (theme === 'cyber' && showTime) {
                const timeSpan = document.createElement('span');
                timeSpan.className = 'timestamp';
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                timeSpan.innerText = `[${hours}:${minutes}] `;
                content.appendChild(timeSpan);
            }

            let safeMsg = escapeHtml(data.message);
            const emoteRegex = /\[emote:(\d+):([^\]]+)\]/g;
            safeMsg = safeMsg.replace(emoteRegex, (match, id, name) => {
                return `<img src="https://files.kick.com/emotes/${id}/fullsize" alt="${name}" title="${name}" class="chat-emote" />`;
            });
            
            const textSpan = document.createElement('span');
            textSpan.innerHTML = safeMsg;
            content.appendChild(textSpan);
            msgBox.appendChild(content);
            container.appendChild(msgBox);

            while (container.children.length > maxMessages) {
                container.removeChild(container.firstChild);
            }
            if (fadeTime > 0) {
                setTimeout(() => {
                    msgBox.classList.add('fade-out');
                    setTimeout(() => {
                        if (msgBox.parentNode === container) {
                            container.removeChild(msgBox);
                        }
                    }, 500);
                }, fadeTime * 1000);
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getBadgeLabel(badge) {
            const labels = {
                'broadcaster': 'Streamer',
                'moderator': 'Mod',
                'vip': 'VIP',
                'subscriber': 'Sub',
                'bot': 'Bot'
            };
            return labels[badge] || badge;
        }
    </script>
</body>

</html>
