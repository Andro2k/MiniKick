<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MiniKick – Music Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link id="theme-style" rel="stylesheet" href="">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: transparent;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(8px, 2.5vw, 28px);
        }

        #player {
            display: flex;
            align-items: center;
            gap: clamp(12px, 1.8vw, 20px);
            padding: clamp(10px, 1.4vw, 20px) clamp(14px, 2.0vw, 26px);
            border-radius: clamp(10px, 1.6vw, 20px);
            width: clamp(320px, 95%, 520px);
            opacity: 0;
            transform: translateY(20px);
            transition:
                opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }

        #player.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Cover Art */
        .cover-art-wrap {
            position: relative;
            flex-shrink: 0;
            width: clamp(60px, 10vw, 100px);
            height: clamp(60px, 10vw, 100px);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cover-art-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .cover-art-wrap .fallback-icon {
            width: 50%;
            height: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cover-art-wrap .fallback-icon svg {
            width: 100%;
            height: 100%;
            fill: none;
        }

        .cover-art-wrap.has-thumbnail .fallback-icon {
            display: none;
        }

        /* Main player container */
        .player-main {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .info {
            flex: 1;
            overflow: hidden;
        }

        .label-now-badge {
            font-size: clamp(8px, 1.8vw, 11px);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .title {
            font-size: clamp(14px, 2.5vw, 18px);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist {
            font-size: clamp(10px, 1.8vw, 13px);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        /* Progress Bar */
        .progress-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }

        .progress-bar-wrap {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .progress-time {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 600;
        }

        /* Equalizer */
        .eq {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 16px;
            flex-shrink: 0;
        }

        .eq span {
            display: block;
            width: 3px;
            border-radius: 1px;
            height: 3px;
        }

        #player.playing .eq span:nth-child(1) { animation: eq-bar 1.0s ease-in-out 0.00s infinite alternate; }
        #player.playing .eq span:nth-child(2) { animation: eq-bar 1.0s ease-in-out 0.15s infinite alternate; }
        #player.playing .eq span:nth-child(3) { animation: eq-bar 1.0s ease-in-out 0.30s infinite alternate; }
        #player.playing .eq span:nth-child(4) { animation: eq-bar 1.0s ease-in-out 0.45s infinite alternate; }

        @keyframes eq-bar {
            from { height: 3px;  opacity: 0.55; }
            to   { height: 16px; opacity: 1.0; }
        }
    </style>
</head>
<body>

<div id="player">
    <div class="cover-art-wrap" id="cover-art-wrap">
        <img id="cover-art" src="" alt="Cover Art">
        <div class="fallback-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 18V6l12-2v12M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"
                      stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                      fill="none"/>
            </svg>
        </div>
    </div>

    <div class="player-main">
        <div class="header-row">
            <div class="info">
                <div class="artist" id="song-artist">–</div>
                <div class="title"  id="song-title">–</div>
            </div>
            <div class="label-now-badge" id="label-now">Now Playing</div>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <div class="progress-time">
                <span id="time-current">0:00</span>
                <span id="time-total">0:00</span>
            </div>
        </div>
    </div>

    <div class="eq">
        <span></span><span></span><span></span><span></span>
    </div>
</div>

<script>
    const player   = document.getElementById('player');
    const elTitle  = document.getElementById('song-title');
    const elArtist = document.getElementById('song-artist');
    const elLabel  = document.getElementById('label-now');

    const urlParams = new URLSearchParams(window.location.search);
    const token     = urlParams.get('token') || '';
    const theme     = urlParams.get('theme') || 'glass';

    const themeStyle = document.getElementById('theme-style');
    themeStyle.href = `/music/css/${theme}.css`;
    player.classList.add(`theme-${theme}`);

    let hideTimer = null;
    let currentProgress = 0;
    let totalDuration = 0;
    let isPlaying = false;
    let progressTimer = null;

    function formatTime(ms) {
        if (!ms || isNaN(ms) || ms < 0) return '0:00';
        const totalSecs = Math.floor(ms / 1000);
        const mins = Math.floor(totalSecs / 60);
        const secs = totalSecs % 60;
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function updateProgressUI() {
        const elCurrent = document.getElementById('time-current');
        const elTotal = document.getElementById('time-total');
        const elFill = document.getElementById('progress-fill');

        if (elCurrent) elCurrent.textContent = formatTime(currentProgress);
        if (elTotal) elTotal.textContent = formatTime(totalDuration);

        if (elFill && totalDuration > 0) {
            const percent = Math.min(100, (currentProgress / totalDuration) * 100);
            elFill.style.width = `${percent}%`;
        } else if (elFill) {
            elFill.style.width = '0%';
        }
    }

    function startProgressTicker() {
        stopProgressTicker();
        if (!isPlaying) return;

        progressTimer = setInterval(() => {
            if (currentProgress < totalDuration) {
                currentProgress += 1000;
                updateProgressUI();
            } else {
                stopProgressTicker();
            }
        }, 1000);
    }

    function stopProgressTicker() {
        clearInterval(progressTimer);
    }

    function showPlayer(title, artist, playing, thumbnail, progress, duration) {
        clearTimeout(hideTimer);
        elTitle.textContent  = title  || '–';
        elArtist.textContent = artist || '–';
        elLabel.textContent  = playing ? 'Now Playing' : 'Paused';

        const elCover = document.getElementById('cover-art');
        const elWrap = document.getElementById('cover-art-wrap');
        if (elCover && elWrap) {
            if (thumbnail) {
                elCover.src = thumbnail;
                elCover.style.display = 'block';
                elWrap.classList.add('has-thumbnail');
            } else {
                elCover.src = '';
                elCover.style.display = 'none';
                elWrap.classList.remove('has-thumbnail');
            }
        }

        isPlaying = playing;
        currentProgress = progress || 0;
        totalDuration = duration || 0;

        updateProgressUI();
        startProgressTicker();

        player.classList.toggle('playing', isPlaying);
        player.classList.add('visible');
    }

    function scheduleHide(delayMs) {
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            player.classList.remove('visible', 'playing');
            stopProgressTicker();
        }, delayMs);
    }

    const es = new EventSource(`/music_events?token=${token}`);

    es.onmessage = function (event) {
        const data = JSON.parse(event.data);

        if (data.type === 'stopped') {
            scheduleHide(3000);
            return;
        }

        if (data.type === 'playing') {
            showPlayer(
                data.title, 
                data.artist, 
                data.is_playing, 
                data.thumbnail, 
                data.progress, 
                data.duration
            );

            if (!data.is_playing) {
                scheduleHide(8000);
            }
        }
    };

    es.onerror = function () {
        scheduleHide(5000);
    };
</script>
</body>
</html>
