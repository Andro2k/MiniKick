<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MiniKick – Music Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: transparent;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(8px, 2.5vw, 28px);
        }

        #player {
            display: flex;
            align-items: center;
            gap: clamp(8px, 1.4vw, 16px);
            padding: clamp(8px, 1.2vw, 16px) clamp(12px, 1.8vw, 22px);
            border-radius: clamp(10px, 1.6vw, 20px);
            background: rgba(12, 12, 18, 0.72);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border: 1.5px solid rgba(255, 255, 255, 0.10);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.55),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            width: clamp(200px, 90%, 480px);
            opacity: 0;
            transform: translateY(20px);
            transition:
                opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }

        #player.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .icon-wrap {
            position: relative;
            flex-shrink: 0;
            width:  clamp(32px, 5vw, 52px);
            height: clamp(32px, 5vw, 52px);
            border-radius: clamp(8px, 1.2vw, 14px);
            background: linear-gradient(135deg, #53d68a 0%, #1db954 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-wrap svg {
            width:  55%;
            height: 55%;
            fill: #fff;
        }

        .icon-wrap::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: inherit;
            border: 2px solid rgba(83, 214, 138, 0.6);
            animation: none;
        }

        #player.playing .icon-wrap::before {
            animation: pulse-ring 2s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%   { transform: scale(1);    opacity: 0.7; }
            60%  { transform: scale(1.22); opacity: 0; }
            100% { transform: scale(1.22); opacity: 0; }
        }

        .info {
            flex: 1;
            overflow: hidden;
        }

        .label-now {
            font-size: clamp(9px, 2.2vw, 13px);
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: clamp(1px, 0.4vw, 4px);
        }

        .title {
            font-size: clamp(12px, 3.2vw, 17px);
            font-weight: 700;
            color: #f0f0f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist {
            font-size: clamp(10px, 2.4vw, 13px);
            font-weight: 500;
            color: rgba(255, 255, 255, 0.50);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: clamp(1px, 0.3vw, 3px);
        }

        .eq {
            display: flex;
            align-items: flex-end;
            gap: clamp(1px, 0.35vw, 3px);
            height: clamp(10px, 2.4vw, 18px);
            flex-shrink: 0;
        }

        .eq span {
            display: block;
            width: clamp(2px, 0.5vw, 4px);
            border-radius: 2px;
            background: #53d68a;
            height: clamp(3px, 0.8vw, 5px);
        }

        #player.playing .eq span:nth-child(1) { animation: eq-bar 1.0s ease-in-out 0.00s infinite alternate; }
        #player.playing .eq span:nth-child(2) { animation: eq-bar 1.0s ease-in-out 0.15s infinite alternate; }
        #player.playing .eq span:nth-child(3) { animation: eq-bar 1.0s ease-in-out 0.30s infinite alternate; }
        #player.playing .eq span:nth-child(4) { animation: eq-bar 1.0s ease-in-out 0.45s infinite alternate; }

        @keyframes eq-bar {
            from { height: clamp(3px, 0.8vw, 5px);  opacity: 0.55; }
            to   { height: clamp(10px, 2.4vw, 18px); opacity: 1.0; }
        }

        #player:not(.playing) .icon-wrap {
            background: linear-gradient(135deg, #4a4a5a 0%, #2e2e3e 100%);
        }
    </style>
</head>
<body>

<div id="player">
    <div class="icon-wrap">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 18V6l12-2v12M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"
                  stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                  fill="none"/>
        </svg>
    </div>

    <div class="info">
        <div class="label-now" id="label-now">Now Playing</div>
        <div class="title"  id="song-title">–</div>
        <div class="artist" id="song-artist">–</div>
    </div>

    <div class="eq">
        <span></span><span></span><span></span><span></span>
    </div>
</div>

<script>
    const player   = document.getElementById('player');
    const elTitle  = document.getElementById('song-title');
    const elArtist = document.getElementById('song-artist');
    const elLabel  = document.getElementById('label-now');

    const urlParams = new URLSearchParams(window.location.search);
    const token     = urlParams.get('token') || '';

    let hideTimer = null;

    function showPlayer(title, artist, isPlaying) {
        clearTimeout(hideTimer);
        elTitle.textContent  = title  || '–';
        elArtist.textContent = artist || '–';
        elLabel.textContent  = isPlaying ? 'Now Playing' : 'Paused';

        player.classList.toggle('playing', isPlaying);
        player.classList.add('visible');
    }

    function scheduleHide(delayMs) {
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            player.classList.remove('visible', 'playing');
        }, delayMs);
    }

    const es = new EventSource(`/music_events?token=${token}`);

    es.onmessage = function (event) {
        const data = JSON.parse(event.data);

        if (data.type === 'stopped') {
            scheduleHide(3000);
            return;
        }

        if (data.type === 'playing') {
            showPlayer(data.title, data.artist, data.is_playing);

            if (!data.is_playing) {
                scheduleHide(8000);
            }
        }
    };

    es.onerror = function () {
        scheduleHide(5000);
    };
</script>
</body>
</html>
