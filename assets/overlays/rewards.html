<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniKick Overlay</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: transparent; height: 100vh; width: 100vw; position: relative; }
        .media-layer { position: absolute; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        const eventSource = new EventSource('/events');
        const container = document.getElementById('container');

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            playAlert(data);
        };

        function playAlert(data) {
            const mediaEl = document.createElement('video');
            mediaEl.src = data.file_url;
            mediaEl.className = 'media-layer';
            mediaEl.autoplay = true;
            
            // 1. Aplicar Volumen
            mediaEl.volume = data.volume !== undefined ? data.volume : 1.0;

            // 2. Aplicar Posición y Escala (Solo visible en videos)
            const scale = data.scale || 1.0;
            const pos = data.position || "center";

            if (pos === "center") {
                mediaEl.style.top = "50%"; mediaEl.style.left = "50%";
                mediaEl.style.transform = `translate(-50%, -50%) scale(${scale})`;
            } else if (pos === "top-left") {
                mediaEl.style.top = "0"; mediaEl.style.left = "0";
                mediaEl.style.transform = `scale(${scale})`;
                mediaEl.style.transformOrigin = "top left";
            } else if (pos === "top-right") {
                mediaEl.style.top = "0"; mediaEl.style.right = "0";
                mediaEl.style.transform = `scale(${scale})`;
                mediaEl.style.transformOrigin = "top right";
            } else if (pos === "bottom-left") {
                mediaEl.style.bottom = "0"; mediaEl.style.left = "0";
                mediaEl.style.transform = `scale(${scale})`;
                mediaEl.style.transformOrigin = "bottom left";
            } else if (pos === "bottom-right") {
                mediaEl.style.bottom = "0"; mediaEl.style.right = "0";
                mediaEl.style.transform = `scale(${scale})`;
                mediaEl.style.transformOrigin = "bottom right";
            }

            mediaEl.onended = () => mediaEl.remove();
            mediaEl.onerror = () => mediaEl.remove();

            container.appendChild(mediaEl);
        }
    </script>
</body>
</html>
