<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MiniKick Overlay</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background-color: transparent; 
            height: 100vh; width: 100vw; 
            position: relative; 
        }
        .media-layer { 
            position: absolute; 
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        const eventSource = new EventSource('/events');
        const container = document.getElementById('container');

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            playAlert(data);
        };

        function playAlert(data) {
            const mediaEl = document.createElement('video');
            mediaEl.src = data.file_url;
            mediaEl.className = 'media-layer';
            mediaEl.autoplay = true;
            
            mediaEl.volume = data.volume !== undefined ? data.volume : 1.0;

            const scale = data.scale || 1.0;
            const px = data.pos_x || 0;
            const py = data.pos_y || 0;

            // Posicionamiento estricto por coordenadas X e Y
            mediaEl.style.left = px + "px";
            mediaEl.style.top = py + "px";
            mediaEl.style.transform = `scale(${scale})`;
            mediaEl.style.transformOrigin = "top left"; // El punto 0,0 es la esquina sup-izq del video

            mediaEl.onended = () => mediaEl.remove();
            mediaEl.onerror = (e) => {
                console.error("No se pudo reproducir. Verifica la ruta.", e);
                mediaEl.remove();
            };

            container.appendChild(mediaEl);
        }
    </script>
</body>
</html>
