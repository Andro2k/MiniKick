<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autenticación - MiniKick</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      body {
        background-color: #09090b;
        color: #eaecef;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .modal {
        background-color: #121214;
        width: 100%;
        max-width: 420px;
        border-radius: 12px;
        border: 1.5px solid #27272a;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        padding: 24px;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid #27272a;
      }

      .modal-header h2 {
        font-size: 16px;
        font-weight: 600;
        color: #eaecef;
      }

      .close-btn {
        background: none;
        border: none;
        color: #848e9c;
        font-size: 20px;
        cursor: pointer;
        transition: color 0.2s;
      }

      .close-btn:hover {
        color: #eaecef;
      }

      .connection-visual {
        background-color: #09090b;
        border: 1.5px solid #27272a;
        border-radius: 12px;
        padding: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
      }

      .icon-box {
        width: 56px;
        height: 56px;
        background-color: #121214;
        border: 1.5px solid #27272a;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      .icon-box.success {
        background-color: rgba(100, 235, 95, 0.1);
        border-color: rgba(100, 235, 95, 0.3);
      }

      .icon-box.error {
        background-color: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.3);
      }

      .connection-line {
        flex-grow: 1;
        height: 2px;
        margin: 0 16px;
        background: repeating-linear-gradient(
          to right,
          #27272a,
          #27272a 6px,
          transparent 6px,
          transparent 12px
        );
        position: relative;
      }

      .connection-line.success-line::after {
        content: "";
        position: absolute;
        top: -3px;
        left: 0;
        width: 8px;
        height: 8px;
        background-color: #64eb5f;
        border-radius: 50%;
        box-shadow: 0 0 8px #64eb5f;
        animation: moveDot 2s ease-in-out infinite;
      }

      @keyframes moveDot {
        0% {
          left: 0;
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        80% {
          opacity: 1;
        }
        100% {
          left: 100%;
          opacity: 0;
        }
      }

      .description {
        text-align: center;
        color: #a1a1aa;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .description span {
        color: #eaecef;
        font-weight: 600;
      }

      .description .error-detail {
        display: inline-block;
        margin-top: 10px;
        color: #ef4444;
        background-color: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.2);
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
        text-align: left;
        width: 100%;
        word-break: break-word;
      }

      .btn-primary {
        width: 100%;
        background-color: #64eb5f;
        color: #09090b;
        border: none;
        border-radius: 8px;
        padding: 14px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition:
          background-color 0.2s,
          transform 0.1s;
      }

      .btn-primary:hover {
        background-color: #2fbf45;
      }

      .btn-primary:active {
        transform: scale(0.98);
      }

      .btn-primary.btn-error {
        background-color: #ef4444;
        color: #ffffff;
      }

      .btn-primary.btn-error:hover {
        background-color: #dc2626;
      }
    </style>
  </head>
  <body>
    <div class="modal">
      <div class="modal-header">
        <h2 id="title-text">Cargando...</h2>
        <button class="close-btn" onclick="cerrarVentana()">×</button>
      </div>

      <div class="connection-visual">
        <div class="icon-box" id="provider-icon"></div>

        <div class="connection-line" id="connect-line"></div>
        <div class="icon-box" id="status-icon"></div>
      </div>

      <p class="description" id="desc-text">Procesando autenticación...</p>

      <button class="btn-primary" id="btn-action" onclick="cerrarVentana()">
        Cerrar
      </button>
    </div>

    <script>
      const provider = "{{PROVIDER}}";
      const status = "{{STATUS}}";
      const errorMsg = "{{ERROR_MSG}}";

      const capitalizedProvider =
        provider.charAt(0).toUpperCase() + provider.slice(1);
      document.title =
        status === "success"
          ? `Conexión Exitosa - ${capitalizedProvider}`
          : `Conexión Fallida - ${capitalizedProvider}`;

      const titleText = document.getElementById("title-text");
      const providerIcon = document.getElementById("provider-icon");
      const statusIcon = document.getElementById("status-icon");
      const descText = document.getElementById("desc-text");
      const btnAction = document.getElementById("btn-action");
      const connectLine = document.getElementById("connect-line");

      const kickSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#ffffff"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M9 3a1 1 0 0 1 1 1v3h1v-1a1 1 0 0 1 .883 -.993l.117 -.007h1v-1a1 1 0 0 1 .883 -.993l.117 -.007h6a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-1v1a1 1 0 0 1 -.883 .993l-.117 .007h-1v2h1a1 1 0 0 1 .993 .883l.007 .117v1h1a1 1 0 0 1 .993 .883l.007 .117v4a1 1 0 0 1 -1 1h-6a1 1 0 0 1 -1 -1v-1h-1a1 1 0 0 1 -.993 -.883l-.007 -.117v-1h-1v3a1 1 0 0 1 -.883 .993l-.117 .007h-5a1 1 0 0 1 -1 -1v-16a1 1 0 0 1 1 -1z" /></svg>`;

      const spotifySvg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5.49 14.42c-.22.36-.68.47-1.04.25-2.28-1.4-5.15-1.71-8.53-.94-.41.09-.82-.16-.91-.57-.09-.41.16-.82.57-.91 3.71-.85 6.87-.5 9.47 1.1.36.22.48.68.25 1.04zm1.46-3.08c-.28.45-.87.6-1.32.32-2.61-1.6-6.59-2.06-9.67-1.12-.51.15-1.04-.14-1.2-.66-.15-.51.14-1.04.66-1.2 3.53-1.07 7.92-.56 10.93 1.28.45.28.6.87.32 1.32zm.12-3.21c-.34.56-1.08.73-1.63.4-3.04-1.8-8.03-1.97-10.92-1.1-.62.19-1.27-.16-1.46-.78-.19-.62.16-1.27.78-1.46 3.44-1.04 8.94-.84 12.44 1.24.55.33.72 1.07.4 1.63z" /></svg>`;

      const checkSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="#64EB5F"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M17 3.34a10 10 0 1 1 -14.995 8.984l-.005 -.324l.005 -.324a10 10 0 0 1 14.995 -8.336zm-1.293 5.953a1 1 0 0 0 -1.32 -.083l-.094 .083l-3.293 3.292l-1.293 -1.292l-.094 -.083a1 1 0 0 0 -1.403 1.403l.083 .094l2 2l.094 .083a1 1 0 0 0 1.226 0l.094 -.083l4 -4l.083 -.094a1 1 0 0 0 -.083 -1.32z" /></svg>`;

      const crossSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="#EF4444"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M17 3.34a10 10 0 1 1 -14.995 8.984l-.005 -.324l.005 -.324a10 10 0 0 1 14.995 -8.336zm-2.293 4.953a1 1 0 0 0 -1.414 0l-1.293 1.293l-1.293 -1.293a1 1 0 0 0 -1.414 1.414l1.293 1.293l-1.293 1.293a1 1 0 0 0 1.414 1.414l1.293 -1.293l1.293 1.293a1 1 0 0 0 1.414 -1.414l-1.293 -1.293l1.293 -1.293a1 1 0 0 0 0 -1.414z" /></svg>`;

      providerIcon.innerHTML = provider === "spotify" ? spotifySvg : kickSvg;

      if (status === "success") {
        titleText.textContent = "Conexión Establecida";
        statusIcon.innerHTML = checkSvg;
        statusIcon.className = "icon-box success";
        connectLine.className = "connection-line success-line";

        descText.innerHTML = `El bot ha recibido acceso y se ha autenticado correctamente en <span>${capitalizedProvider}</span>.<br><br>Ya puedes regresar a la aplicación para continuar.`;
        btnAction.className = "btn-primary";
        btnAction.textContent = "Cerrar ventana";
      } else {
        titleText.textContent = "Conexión Fallida";
        statusIcon.innerHTML = crossSvg;
        statusIcon.className = "icon-box error";
        connectLine.className = "connection-line";

        descText.innerHTML = `Ocurrió un error al intentar vincular tu cuenta de <span>${capitalizedProvider}</span>.<br><br><span class="error-detail">${errorMsg || "La autenticación fue cancelada o expiró."}</span>`;
        btnAction.className = "btn-primary btn-error";
        btnAction.textContent = "Cerrar ventana";
      }

      function cerrarVentana() {
        window.close();
        const finalTitle =
          status === "success" ? "¡Todo listo!" : "Proceso Terminado";
        const finalColor = status === "success" ? "#64eb5f" : "#ef4444";
        document.body.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h2 style="color: ${finalColor}; margin-bottom: 10px;">${finalTitle}</h2>
                    <p style="color: #848e9c;">Puedes cerrar esta pestaña manualmente.</p>
                </div>
            `;
      }
    </script>
  </body>
</html>
