<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        #media-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video, audio { max-width: 100%; max-height: 100%; display: none; }
    </style>
</head>
<body>
    <div id="media-container">
        <video id="vid-player"></video>
        <audio id="aud-player"></audio>
    </div>

    <script>
        const ws = new WebSocket("ws://127.0.0.1:8081/ws");
        const video = document.getElementById("vid-player");
        const audio = document.getElementById("aud-player");

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.action === "play") {
                const url = "/media/" + data.file;
                const vol = data.volume / 100;

                if (data.type === "video") {
                    video.src = url;
                    video.volume = vol;
                    video.style.display = "block";
                    video.play();
                    video.onended = () => video.style.display = "none";
                } else {
                    audio.src = url;
                    audio.volume = vol;
                    audio.play();
                }
            }
        };
        
        // Auto-reconectar si OBS pierde señal
        ws.onclose = () => setTimeout(() => location.reload(), 3000);
    </script>
</body>
</html>
